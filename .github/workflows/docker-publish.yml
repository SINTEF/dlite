name: Publish docker images

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  schedule:
    - cron: '22 4 * * 1'
  push:
    branches: [ "master" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "master" ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  #IMAGE_NAME: ${{ github.repository }}


jobs:
  build:
    name: Build and publish docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:

        # 64-bit manylinux
        - system: "manylinux"
          arch: "x86_64"
          distribution: "almalinux"
          base_image: "quay.io/pypa/manylinux_2_28_x86_64:latest"
          py_minors: "8 9 10 11 12 13 14"

        # 32-bit manylinux
        - system: "manylinux"
          type: "2014"
          arch: "i686"
          #distribution: "almalinux"
          #base_image: "quay.io/pypa/manylinux_2_28_i686:latest"
          distribution: "centos"
          base_image: "quay.io/pypa/manylinux2014_i686:latest"
          py_minors: "10 11 12 13 14"

        # 64-bit musllinux
        - system: "musllinux"
          arch: "x86_64"
          distribution: "alpine"
          base_image: "quay.io/pypa/musllinux_1_2_x86_64:latest"
          py_minors: "8 9 10 11 12 13 14"

        # 32-bit musllinux
        - system: "musllinux"
          arch: "i686"
          distribution: "alpine"
          base_image: "quay.io/pypa/musllinux_1_2_i686:latest"
          py_minors: "9 10 11"

        # ubuntu ci tests
        - system: "ubuntu"
          arch: "x86_64"
          distribution: "ubuntu:latest"
          base_image: "ubuntu:latest"
          py_minors: "9 10 11"

    steps:
      - name: Define environment variables
        run: |
          # System string
          SYSTEM="${{ matrix.system }}_${{ matrix.arch }}"
          echo "SYSTEM=$SYSTEM" >> "$GITHUB_ENV"
          # Docker template
          echo "TEMPLATE=Dockerfile-${{ matrix.distribution }}" >> "$GITHUB_ENV"
          # Relative path to Dockerfile to build
          echo "DOCKERFILE=docker_build/Dockerfile-${SYSTEM}" >> "$GITHUB_ENV"
          # The base image to use when building the docker container
          echo "IMAGE=${{ github.repository }}/${SYSTEM}:latest" >> "$GITHUB_ENV"
          # Filename to store SHA hash of the Dockerfile
          #echo "SHA_FILENAME=${SYSTEM}.sha.txt" >> "$GITHUB_ENV"
          # Cache directory for checking whether to (re)build docker container
          #echo "CACHE_DIR=.buildx-cache-${SYSTEM}" >> "$GITHUB_ENV"

      - name: Create docker file
        run: |
          mkdir -p docker_build
          ls -al
          ls .github/docker
          sed \
            -e "s|{{ BASE_IMAGE }}|${{ matrix.base_image }}|" \
            -e "s|{{ PY_MINORS }}|${{ matrix.py_minors }}|" \
            .github/docker/Dockerfile-${{ matrix.distribution }} \
            > ${DOCKERFILE}
          ls -al docker_build

          #bash .github/docker/mkdockerfile.sh \
          #  ${{ matrix.distribution }} \
          #  ${{ matrix.base_image }} \
          #  ${{ matrix.py_minors }} \
          #  > ${DOCKERFILE}

      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.0

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5.0.0
        with:
          images: ${{ env.REGISTRY }}/$IMAGE

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5.0.0
        with:
          context: .
          file: $DOCKERFILE
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sign the resulting Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        # This step uses the identity token to provision an ephemeral certificate
        # against the sigstore community Fulcio instance.
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
