name: CI - Activate auto-merging for Dependabot PRs

on:
  pull_request_target:
    branches:
      - ci/dependabot-updates
      - dependabot/github_actions/ci/dependabot-updates/docker/build-push-action-7

jobs:
  update-dependabot-branch:
    name: External
    uses: SINTEF/ci-cd/.github/workflows/ci_automerge_prs.yml@v2.10.0
    if: github.repository_owner == 'SINTEF' && startsWith(github.event.pull_request.head.ref, 'dependabot/') && github.actor == 'dependabot[bot]'
    secrets:
      PAT: ${{ secrets.RELEASE_PAT }}


  debug-contexts:
    runs-on: ubuntu-latest
    steps:
      - name: Dump github context (selected fields)
        run: |
          echo "actor: ${{ github.actor }}"
          echo "repo owner: ${{ github.repository_owner }}"
          echo "event_name: ${{ github.event_name }}"
          echo "base.ref: ${{ github.event.pull_request.base.ref }}"
          echo "head.ref: ${{ github.event.pull_request.head.ref }}"
          echo "head.label: ${{ github.event.pull_request.head.label }}"
          echo "isDependabotRef: ${{ startsWith(github.event.pull_request.head.ref, 'dependabot/') }}"
          echo "repo: ${{ github.repository }}"

      #- name: Dump entire github context (JSON)
      #  env:
      #    GITHUB_JSON: ${{ toJson(github) }}
