name: CI tests

# This CI builds DLite and runs (almost) all tests.

on: [push]

env:
  DLITETEST_MONGODB_USER: user
  DLITETEST_MONGODB_SERVER: localhost


jobs:
  generate_passwords:
    runs-on: ubuntu-latest

    steps:
      - name: Generate passwords
        run: echo "POSTGRES_PASSWORD=$(openssl rand -hex 12)" >> $GITHUB_ENV
        run: echo "DLITETEST_MONGODB_PASSWORD=$(openssl rand -hex 12)" >> $GITHUB_ENV

  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      postgresql:
        image: postgres
        ports: 5432:5432
        options: >-
          -e POSTGRES_PASSWORD=${{ env.POSTGRES_PASSWORD }}
          -e POSTGRES_USER=user
          -e POSTGRES_DB=db

      mongo:
        image: mongo
        ports: 27017:27017
        options: >-
          -e MONGO_INITDB_ROOT_PASSWORD=${{ env.DLITETEST_MONGODB_PASSWORD }}
          -e MONGO_INITDB_ROOT_USERNAME=${{ env.DLITETEST_MONGODB_USER }}
          -e MONGO_INITDB_ROOT_DB=db

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add pgconf.h file
        run: |
          cat <<EOF > storages/python/tests-c/pgconf.h
          #define HOST "localhost"
          #define USER "user"
          #define DATABASE "db"
          #define PASSWORD "$POSTGRES_PASSWORD"
          EOF

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests inside the container
        run: |
          docker run --rm \
            --volume $PWD:/io \
            --network=host \
            ghcr.io/sintef/dlite/ubuntu_x86_64:latest
